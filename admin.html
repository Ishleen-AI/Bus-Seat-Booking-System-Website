<!DOCTYPE html>
<html>
<head>

<title>Admin Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 p-10">

<h1 class="text-2xl font-bold mb-6">
Bus Booking Admin Panel
</h1>

<table class="bg-white shadow rounded w-full">

<thead class="bg-gray-200">

<tr>
<th class="p-3">Seat</th>
<th class="p-3">Student Name</th>
<th class="p-3">UID</th>
</tr>

</thead>

<tbody id="table-body"></tbody>

</table>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
getFirestore,
collection,
onSnapshot
}

from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";


// ADMIN PASSWORD
const password = prompt("Enter admin password")

if(password !== "AMRITSAR123"){

alert("Access denied")
window.location.href="index.html"

}


// FIREBASE CONFIG
const firebaseConfig = {
apiKey: "AIzaSyAgkYhpTHF0dU3Wm1WhqsaxTK9zG5GxYpA",
authDomain: "bus-seat-booking-system-4a7c0.firebaseapp.com",
projectId: "bus-seat-booking-system-4a7c0",
storageBucket: "bus-seat-booking-system-4a7c0.firebasestorage.app",
messagingSenderId: "1029876783708",
appId: "1:1029876783708:web:d6bd3c1cf2b06dd345a499"
};


// INITIALIZE FIREBASE
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


// TABLE BODY
const body = document.getElementById("table-body")


// REALTIME BOOKINGS LISTENER
onSnapshot(collection(db,"bookings"),(snapshot)=>{

let rows=""

snapshot.forEach((doc)=>{

const data = doc.data()

rows+=`
<tr class="border-b">
<td class="p-3">${data.seat}</td>
<td class="p-3">${data.name}</td>
<td class="p-3">${data.uid}</td>
</tr>
`

})

body.innerHTML = rows

})

</script>

</body>
</html>
