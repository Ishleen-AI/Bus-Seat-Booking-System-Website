<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Campus Express Bus Booking</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>

.seat{
transition:all .2s ease;
}

.seat.selected{
transform:scale(1.05);
}

@keyframes pop{
0%{transform:scale(1)}
50%{transform:scale(1.1)}
100%{transform:scale(1.05)}
}

.animate-pop{
animation:pop .3s ease-out forwards;
}

</style>

</head>

<body class="bg-gray-100 font-sans text-gray-800 min-h-screen">

<header class="bg-slate-900 text-white p-4 shadow-lg sticky top-0">

<div class="max-w-6xl mx-auto flex justify-between items-center">

<h1 class="text-xl font-bold">
<i class="fa-solid fa-bus-simple mr-2 text-rose-500"></i>
Campus Express
</h1>

<div class="flex gap-3">

<a href="admin.html" class="bg-emerald-500 px-3 py-1 rounded text-sm">
Admin Panel
</a>

<button onclick="resetBus()" class="bg-red-500 px-3 py-1 rounded text-sm">
Reset Bus
</button>

</div>

</div>

</header>


<main class="max-w-6xl mx-auto p-4 md:p-8 flex flex-col lg:flex-row gap-8">

<div class="flex-1 flex flex-col items-center">

<div class="bg-white p-4 rounded-xl shadow-sm mb-6 flex gap-6 text-sm border">

<div class="flex items-center gap-2">
<div class="w-4 h-4 border-2 border-emerald-500 rounded"></div>
Available
</div>

<div class="flex items-center gap-2">
<div class="w-4 h-4 bg-rose-500 rounded"></div>
Selected
</div>

<div class="flex items-center gap-2">
<div class="w-4 h-4 bg-gray-300 rounded"></div>
Booked
</div>

</div>

<div class="bg-white border-4 border-gray-200 rounded-[3rem] p-8 shadow-2xl min-w-[320px]">

<div class="flex justify-end mb-10 border-b pb-6">

<div class="w-12 h-12 border-4 border-gray-700 rounded-full flex items-center justify-center opacity-50">

<div class="w-1 h-8 bg-gray-700 rotate-45 absolute"></div>

<div class="w-1 h-8 bg-gray-700 -rotate-45 absolute"></div>

</div>

</div>

<div id="bus-grid" class="space-y-4"></div>

</div>

</div>


<div class="lg:w-80">

<div class="bg-white p-6 rounded-2xl shadow-lg border sticky top-24">

<h2 class="text-lg font-bold border-b pb-3 mb-4 text-slate-700">
Booking Details
</h2>

<div id="cart-empty" class="text-center py-10 text-gray-400">
<i class="fa-solid fa-couch text-3xl mb-2 opacity-20"></i>
<p>No seats selected</p>
</div>

<div id="cart-active" class="hidden">

<div id="selected-list" class="flex flex-wrap gap-2 mb-6"></div>

<button onclick="openBookingModal()" class="w-full bg-rose-500 hover:bg-rose-600 text-white font-bold py-3 rounded-xl">
Book Selected Seats
</button>

</div>

</div>

</div>

</main>


<div id="modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">

<div class="bg-white w-full max-w-md rounded-2xl shadow-2xl">

<div class="p-6 border-b flex justify-between">

<h3 class="font-bold text-lg">
Enter Student Details
</h3>

<button onclick="closeModal()">X</button>

</div>

<div id="modal-body" class="p-6 space-y-4 max-h-80 overflow-y-auto"></div>

<div class="p-4 border-t flex justify-end gap-3">

<button onclick="closeModal()">Cancel</button>

<button onclick="processFinalBooking()" class="bg-emerald-500 text-white px-5 py-2 rounded">
Confirm
</button>

</div>

</div>

</div>


<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc }

from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAgkYhpTHF0dU3Wm1WhqsaxTK9zG5GxYpA",
authDomain: "bus-seat-booking-system-4a7c0.firebaseapp.com",
projectId: "bus-seat-booking-system-4a7c0",
storageBucket: "bus-seat-booking-system-4a7c0.firebasestorage.app",
messagingSenderId: "1029876783708",
appId: "1:1029876783708:web:d6bd3c1cf2b06dd345a499"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const seats={}
let selected=[]


function init(){

for(let r=1;r<=12;r++){

['A','B','C','D','E'].forEach(col=>{
seats[`${r}${col}`]={booked:false,name:'',uid:''}
})

}

['A','B','C','D','E','F'].forEach(col=>{
seats[`13${col}`]={booked:false,name:'',uid:''}
})

render()
loadBookings()

}


async function loadBookings(){

const querySnapshot = await getDocs(collection(db,"bookings"))

querySnapshot.forEach((d)=>{

const data=d.data()

if(seats[data.seat]){
seats[data.seat]={booked:true,name:data.name,uid:data.uid}
}

})

render()

}


function toggleSeat(id){

if(seats[id].booked) return

const idx=selected.indexOf(id)

if(idx>-1) selected.splice(idx,1)
else selected.push(id)

render()

}


function render(){

const grid=document.getElementById('bus-grid')

let html=''

for(let r=1;r<=12;r++){

html+=`<div class="flex justify-between items-center">

<div class="flex gap-2">

${renderSeat(r+'A')}
${renderSeat(r+'B')}

</div>

<div class="text-gray-300 font-bold text-xs">${r}</div>

<div class="flex gap-2">

${renderSeat(r+'C')}
${renderSeat(r+'D')}
${renderSeat(r+'E')}

</div>

</div>`

}

html+=`<div class="mt-6 pt-6 border-t flex justify-between gap-1">

${['A','B','C','D','E','F'].map(c=>renderSeat('13'+c)).join('')}

</div>`

grid.innerHTML=html

updateCart()

}


function renderSeat(id){

const s=seats[id]
const isSel=selected.includes(id)

let cls="seat w-10 h-11 rounded border flex flex-col items-center justify-center text-[10px] font-bold cursor-pointer "

if(s.booked){

cls+="bg-gray-200 text-gray-500 cursor-not-allowed"

return `<div class="${cls}" title="Booked by ${s.name}">
<div>${id}</div>
<div class="text-[8px]">${s.name}</div>
</div>`

}

else if(isSel){

cls+="bg-rose-500 text-white animate-pop"

}

else{

cls+="border-emerald-500 text-emerald-600 hover:bg-emerald-50"

}

return `<div class="${cls}" onclick="toggleSeat('${id}')">${id}</div>`

}


function updateCart(){

const empty=document.getElementById('cart-empty')
const active=document.getElementById('cart-active')
const list=document.getElementById('selected-list')

if(selected.length===0){

empty.classList.remove('hidden')
active.classList.add('hidden')

}

else{

empty.classList.add('hidden')
active.classList.remove('hidden')

list.innerHTML=selected.map(id=>`<span class="bg-rose-100 text-rose-600 px-3 py-1 rounded text-xs">${id}</span>`).join('')

}

}


window.openBookingModal=function(){

const body=document.getElementById('modal-body')

body.innerHTML=selected.map(id=>`

<div>

<p class="font-bold text-rose-500 mb-2">Seat ${id}</p>

<input id="name-${id}" placeholder="Student Name" class="w-full border p-2 mb-2">

<input id="uid-${id}" placeholder="Student UID" class="w-full border p-2">

</div>

`).join('')

document.getElementById('modal').classList.replace('hidden','flex')

}


window.closeModal=function(){
document.getElementById('modal').classList.replace('flex','hidden')
}


window.processFinalBooking=async function(){

for(const id of selected){

const name=document.getElementById(`name-${id}`).value
const uid=document.getElementById(`uid-${id}`).value

if(!name||!uid){
alert("Please fill all details")
return
}

await addDoc(collection(db,"bookings"),{
seat:id,
name:name,
uid:uid,
time:new Date()
})

seats[id]={booked:true,name,uid}

}

selected=[]

closeModal()

render()

alert("Seats Booked Successfully!")

}


window.resetBus=async function(){

const password=prompt("Enter Admin Password")

if(password==="NAHI"){

const snapshot=await getDocs(collection(db,"bookings"))

for(const d of snapshot.docs){

await deleteDoc(doc(db,"bookings",d.id))

}

alert("Bus Reset Successfully")

location.reload()

}

else{

alert("Incorrect password")

}

}


init()

</script>

</body>
</html>
